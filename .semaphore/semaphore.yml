version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-arm64-1

auto_cancel:
  running:
    when: "branch != 'master'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'master'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - . vault-setup
      - curl -LsSf https://astral.sh/uv/0.10.10/install.sh | sh
      - uv sync
      - export VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)

blocks:
  - name: "Test"
    dependencies: []
    task:
      jobs:
        - name: "Lint, Type Check, and Test"
          commands:
            - uv run ruff check && uv run pyright && uv run pytest -m unit --junitxml=test-results.xml
      epilogue:
        always:
          commands:
            - "[[ -f test-results.xml ]] && test-results publish test-results.xml"
  - name: "Build"
    dependencies:
      - "Test"
    skip:
      when: "branch != 'master' and branch != 'metadata_revisions'"
    task:
      jobs:
        - name: "Build Package and Store Artifacts in Semaphore"
          commands:
            - echo "Building package with version $VERSION"
            - uv build
      epilogue:
        on_pass:
          commands:
            - artifact push workflow dist/confluent_sql-$VERSION.tar.gz
            - artifact push workflow dist/confluent_sql-$VERSION-py3-none-any.whl

after_pipeline:
  task:
    jobs:
      - name: Publish CICD Results to Semaphore
        commands:
          - test-results gen-pipeline-report || echo "Could not publish pipeline test result report. Are there any test results to publish?"
