version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'master'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'master'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - . vault-setup
      - curl -LsSf https://astral.sh/uv/0.10.10/install.sh | sh
      - export UV_CACHE_KEY="uv-v1-$(checksum pyproject.toml uv.lock)"
      - cache restore "$UV_CACHE_KEY"
      - uv sync
  epilogue:
    on_pass:
      commands:
        - export UV_CACHE_KEY="uv-v1-$(checksum pyproject.toml uv.lock)"
        - cache store "$UV_CACHE_KEY" ~/.cache/uv

blocks:
  - name: "Lint"
    dependencies: []
    task:
      jobs:
        - name: "Ruff Lint"
          commands:
            - uv run ruff check src tests
        - name: "Pyright Type Checking"
          commands:
            - uv run pyright
  - name: "Test"
    dependencies:
      - "Lint"
    task:
      jobs:
        - name: "Run Tests"
          commands:
            # Only unit tests until vault secrets are handled for integration tests
            - uv run pytest -m unit --junitxml=test-results.xml
      epilogue:
        always:
          commands:
            - "[[ -f test-results.xml ]] && test-results publish test-results.xml"
after_pipeline:
  task:
    jobs:
      - name: Publish Test Results to Semaphore
        commands:
          - test-results gen-pipeline-report || echo "Could not publish pipeline test result report. Are there any test results to publish?"
