version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'master'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'master'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - checkout
      - . vault-setup

blocks:
  - name: "Lint"
    dependencies: []
    task:
      jobs:
        - name: "Ruff Lint"
          commands:
            - uv run ruff check src tests
        - name: "Pyright Type Checking"
          commands:
            - uv run pyright
  - name: "Test"
    dependencies:
      - "Lint"
    task:
      prologue:
        commands:
          - curl -LsSf https://astral.sh/uv/0.9.18/install.sh | sh
          - uv sync
      jobs:
        - name: "Run Unit Tests"
          commands:
            - uv run pytest -m unit
        - name: "Run Integration Tests"
          commands:
            - uv run pytest -m integration

after_pipeline:
  task:
    jobs:
      - name: Publish Test Results to Semaphore
        commands:
          - test-results gen-pipeline-report || echo "Could not publish pipeline test result report. Are there any test results to publish?"
